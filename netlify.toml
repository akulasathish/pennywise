[build]
  functions = "netlify/functions"
  publish = "public"

# Route API requests to the serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# Fallback clean routing for single page features
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
